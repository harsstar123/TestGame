
                        <!DOCTYPE html>
                        <html lang="en">
                        <head>
                            <meta charset="UTF-8">
                            <meta name="viewport" content="width=device-width, initial-scale=1.0">
							<style>
								body {
									background-color: white; /* Ensure the iframe has a white background */
								}

								#gameContainer {
    position: relative;
    width: 400px;
    height: 300px;
    background-color: #8BC3FF;
    margin-top: 50px;
}

#ball {
    position: absolute;
    width: 20px;
    height: 20px;
    background-color: red;
    bottom: 10px;
    left: 50%;
    transform: translateX(-50%);
}
							</style>
                        </head>
                        <body>
                            <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jumping Ball Game with Sound</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

<div id="gameContainer">
    <div id="ball"></div>
</div>
<audio id="jumpSound" src="cling.mp3" preload="auto"></audio>

<script src="script.js"></script>
</body>
</html>

							<script>
                            	const gameContainer = document.getElementById('gameContainer');
const ball = document.getElementById('ball');
const jumpSound = document.getElementById('jumpSound');

let gravity = 0.5; // Acceleration due to gravity
let velocity = 0;

function update() {
    // Apply gravity
    velocity += gravity;
    
    // Update the ball's position
    let newTop = ball.offsetTop + velocity;
    
    if (newTop >= gameContainer.offsetHeight - ball.offsetHeight) {
        // Ball hits the bottom of the container, reset its position and stop the jump
        newTop = gameContainer.offsetHeight - ball.offsetHeight;
        velocity = 0;
    }
    
    ball.style.top = `${newTop}px`;
}

function jump() {
    if (velocity === 0) {
        // Start a new jump by giving the ball an initial upward velocity and play the sound effect
        velocity = -15;
        jumpSound.play();
    }
}

document.addEventListener('keydown', function(event) {
    if (event.key === ' ') {
        jump();
    }
});

setInterval(update, 20);
							</script>
                        </body>
                        </html>
